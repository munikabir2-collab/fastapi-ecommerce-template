<!DOCTYPE html>
<html>
<head>
    <title>Your Cart</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">
    <h2>Your Cart</h2>

    {% if items %}
        <table class="table table-bordered mt-3">
            <thead class="table-dark">
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Qty</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                {% for item in items %}
                <tr>

                    <!-- ✅ Product Name -->
                    <td>{{ item.product.name }}</td>

                    <!-- ✅ Use stored price -->
                    <td>₹{{ item.price }}</td>

                    <!-- ✅ Quantity with buttons -->
                    <td>
                        <form action="/cart/decrease/{{ item.id }}" method="post" style="display:inline;">
                            <button class="btn btn-sm btn-secondary">➖</button>
                        </form>

                        <strong class="mx-2">{{ item.quantity }}</strong>

                        <form action="/cart/increase/{{ item.id }}" method="post" style="display:inline;">
                            <button class="btn btn-sm btn-secondary">➕</button>
                        </form>
                    </td>

                    <!-- ✅ Correct total -->
                    <td>₹{{ item.price * item.quantity }}</td>

                    <!-- ✅ Remove -->
                    <td>
                        <form action="/cart/remove/{{ item.id }}" method="post">
                            <button class="btn btn-danger btn-sm">
                                Remove
                            </button>
                        </form>
                    </td>

                </tr>
                {% endfor %}
            </tbody>
        </table>

        <h4 class="mt-3">
            Total Amount: ₹{{ total }}
        </h4>

        <!-- ✅ CHECKOUT -->
        <form action="/cart/checkout" method="post" class="mt-3">

            <label class="form-label">Payment Method</label>
            <select name="payment_method"
                    class="form-select"
                    required>
                <option value="COD">Cash on Delivery</option>
                <option value="ONLINE">Online Payment</option>
            </select>

            <button class="btn btn-success btn-lg mt-3">
                Buy Now
            </button>
        </form>

    {% else %}
        <div class="alert alert-warning mt-3">
            Your cart is empty.
        </div>

        <a href="/products" class="btn btn-primary">
            Go to Products
        </a>
    {% endif %}
</div>

</body>
</html>
