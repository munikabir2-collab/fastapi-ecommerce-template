<!DOCTYPE html>
<html>
<head>
    <title>Edit Seller Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-header fw-bold d-flex justify-content-between">
            ✏️ Edit Seller Profile
            <a href="/seller/profile" class="btn btn-sm btn-outline-secondary">⬅ Back</a>
        </div>

        <div class="card-body">
            <form method="post" action="/seller/profile/edit">

                <!-- 🏪 Shop Info -->
                <div class="mb-3">
                    <label class="form-label">Shop Name</label>
                    <input
                        type="text"
                        name="shop_name"
                        class="form-control"
                        value="{{ profile.shop_name }}"
                        required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Shop Description</label>
                    <textarea
                        name="shop_description"
                        class="form-control"
                        rows="3">{{ profile.shop_description }}</textarea>
                </div>

                <!-- 🧾 GST -->
                <div class="mb-3">
                    <label class="form-label">GST Number</label>
                    <input
                        type="text"
                        name="gst_no"
                        class="form-control"
                        value="{{ profile.gst_no }}"
                        placeholder="e.g. 29ABCDE1234F1Z5">
                </div>

                <!-- 📍 Address -->
                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <input
                        type="text"
                        name="address"
                        class="form-control"
                        value="{{ profile.address }}">
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">State</label>
                        <input
                            type="text"
                            name="state"
                            class="form-control"
                            value="{{ profile.state }}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Pincode</label>
                        <input
                            type="text"
                            name="pincode"
                            class="form-control"
                            value="{{ profile.pincode }}">
                    </div>
                </div>

                <!-- ✅ Buttons -->
                <button type="submit" class="btn btn-success">
                    💾 Save Changes
                </button>

                <a href="/seller/profile" class="btn btn-secondary">
                    Cancel
                </a>

            </form>
        </div>
    </div>
</div>

</body>
</html>
