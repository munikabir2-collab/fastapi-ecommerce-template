<!DOCTYPE html>
<html>
<head>

<title>Upgrade Plan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">Choose Your Plan</h2>

<div class="row">

{% for plan in plans %}

<div class="col-md-3">

<div class="card shadow">

<div class="card-body text-center">

<h4>{{ plan.name }}</h4>

<h3>₹ {{ plan.price }}</h3>

<p>{{ plan.product_limit }} Products</p>

<p>{{ plan.duration_days }} Days</p>

<a href="/subscribe/{{ plan.id }}" class="btn btn-success">
Select Plan
</a>

<a href="/payment/{{ plan.id }}" class="btn btn-primary mt-2">
Buy Plan
</a>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
