<!DOCTYPE html>
<html>
<head>
    <title>Sales</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">
    <h2>Sales</h2>

    <a href="/seller/dashboard" class="btn btn-secondary mb-3">
        ← Back to Dashboard
    </a>

    {% if orders %}
    <table class="table table-striped">
        <thead class="table-dark">
        <tr>
            <th>Order ID</th>
            <th>Product</th>
            <th>Quantity</th>
            <th>Total</th>
        </tr>
        </thead>
        <tbody>
        {% for order in orders %}
        <tr>
            <td>{{ order.id }}</td>
            <td>{{ order.product_name }}</td>
            <td>{{ order.quantity }}</td>
            <td>₹{{ order.total_price }}</td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
    {% else %}
        <p>No sales yet.</p>
    {% endif %}
</div>

</body>
</html>
