<!DOCTYPE html>
<html>
<head>
    <title>Notifications</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body onclick="enableSound()">

<div class="container mt-4">
    <h3>🔔 Notifications</h3>

    <ul id="notificationList" class="list-group mt-3">
        {% if notifications %}
            {% for n in notifications %}
                <li class="list-group-item {% if not n.is_read %}fw-bold{% endif %}">
                    {{ n.title }}<br>
                    <small class="text-muted">
                        {{ n.message }} · {{ n.created_at.strftime("%d %b %Y %I:%M %p") }}
                    </small>
                </li>
            {% endfor %}
        {% else %}
            <li class="list-group-item text-muted">
                No notifications yet.
            </li>
        {% endif %}
    </ul>
</div>

<!-- 🔊 Notification Sound -->
<audio id="notifSound">
    <source src="/static/sounds/notification.mp3" type="audio/mpeg">
</audio>

<script>
    const sellerId = "{{ request.session.seller_id }}";
    const sound = document.getElementById("notifSound");

    function enableSound() {
        sound.play().then(() => sound.pause()).catch(() => {});
    }

    const socket = new WebSocket(
        `ws://127.0.0.1:8000/ws/seller/${sellerId}`
    );

    socket.onmessage = function(event) {
        const data = JSON.parse(event.data);

        // 🔔 Add notification to list
        const li = document.createElement("li");
        li.className = "list-group-item fw-bold";
        li.innerHTML = `
            ${data.title}<br>
            <small class="text-muted">${data.message}</small>
        `;

        const list = document.getElementById("notificationList");

        // remove "No notifications yet."
        if (list.children.length === 1 &&
            list.children[0].innerText.includes("No notifications")) {
            list.innerHTML = "";
        }

        list.prepend(li);

        // 🔊 Play sound
        sound.play().catch(() => {
            console.log("Sound blocked until user interaction");
        });
    };
</script>

</body>
</html>
