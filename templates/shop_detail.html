

<a href="/seller/shop" class="btn btn-secondary">
    Edit Shop Details
</a>


<h2>My Shop Details</h2>

<form action="/seller/shop" method="post">
    <input type="text" name="shop_name" placeholder="Shop Name" required>
    <input type="text" name="shop_location" placeholder="Location" required>
    <textarea name="shop_description" placeholder="About your shop"></textarea>

    <button type="submit">Save Shop</button>
</form>
